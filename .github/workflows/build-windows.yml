name: Build Windows

on:
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Remove signing key from config
        run: |
          $conf = Get-Content src-tauri/tauri.conf.json -Raw
          $conf = $conf -replace '"pubkey":\s*"[^"]*"', '"pubkey": ""'
          Set-Content src-tauri/tauri.conf.json $conf
        shell: pwsh

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: lts/*

      - name: Install pnpm
        run: npm install -g pnpm

      - name: Install frontend dependencies
        run: pnpm install

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: './src-tauri -> target'

      - name: Build Tauri app
        run: pnpm tauri build

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: omniget-visible-webview
          path: |
            src-tauri/target/release/omniget.exe
            src-tauri/target/release/bundle/nsis/*.exe
